<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 276 598" width="276" height="598" role="img" aria-labelledby="t">
  <title id="t">Placeholder preview of an example restaurant website, replace with a real client screenshot</title>
  <defs>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061417"/>
      <stop offset="1" stop-color="#012c3c"/>
    </linearGradient>
  </defs>

  <rect width="276" height="598" fill="#ffffff"/>

  <!-- nav -->
  <rect width="276" height="54" fill="#c6bfbb"/>
  <text x="18" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#061417">Kroeung House</text>
  <rect x="240" y="24" width="20" height="2.4" rx="1.2" fill="#061417"/>
  <rect x="240" y="30" width="20" height="2.4" rx="1.2" fill="#061417"/>
  <rect x="240" y="36" width="20" height="2.4" rx="1.2" fill="#061417"/>

  <!-- hero image block -->
  <rect x="0" y="54" width="276" height="248" fill="url(#hero-grad)"/>
  <text x="138" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#c6bfbb">Kroeung House</text>
  <text x="138" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#6f95a6">Modern Khmer Kitchen · Siem Reap</text>
  <rect x="88" y="198" width="100" height="34" rx="17" fill="#285669"/>
  <text x="138" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Reserve a table</text>

  <!-- status line -->
  <circle cx="20" cy="322" r="4" fill="#3f9d5c"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="11.5" fill="#012c3c">Open now · 11:00–21:00</text>

  <!-- menu photo grid -->
  <g>
    <rect x="16" y="346" width="76" height="76" rx="12" fill="#a89c90"/>
    <rect x="100" y="346" width="76" height="76" rx="12" fill="#928477"/>
    <rect x="184" y="346" width="76" height="76" rx="12" fill="#7a6f63"/>
    <text x="54" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#061417">Amok</text>
    <text x="138" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#061417">Lok Lak</text>
    <text x="222" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#061417">Khmer BBQ</text>
  </g>

  <!-- info card -->
  <rect x="16" y="462" width="244" height="108" rx="14" fill="#c6bfbb" stroke="#ddd9d6"/>
  <text x="32" y="490" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#061417">Siem Reap, Cambodia</text>
  <text x="32" y="510" font-family="Arial, sans-serif" font-size="11" fill="#012c3c">Wat Bo Road, near the Old Market</text>
  <text x="32" y="530" font-family="Arial, sans-serif" font-size="11" fill="#012c3c">★ 4.9 (128 Google reviews)</text>
  <rect x="32" y="542" width="90" height="16" rx="8" fill="#285669"/>
  <text x="77" y="554" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff">Get directions</text>
</svg>
