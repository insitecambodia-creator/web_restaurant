  <rect x="0" y="54" width="276" height="248" fill="url(#hero-grad)"/>
  <text x="138" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#fffdf8">Kroeung House</text>
