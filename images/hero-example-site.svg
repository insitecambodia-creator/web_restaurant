  <rect x="240" y="24" width="20" height="2.4" rx="1.2" fill="#241c17"/>
  <rect x="240" y="30" width="20" height="2.4" rx="1.2" fill="#241c17"/>
  <rect x="240" y="36" width="20" height="2.4" rx="1.2" fill="#241c17"/>

