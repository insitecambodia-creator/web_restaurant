  <!-- info card -->
  <rect x="16" y="462" width="244" height="108" rx="14" fill="#f7f4e3" stroke="#e4decd"/>
  <text x="32" y="490" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0d1419">Siem Reap, Cambodia</text>
  <text x="32" y="510" font-family="Arial, sans-serif" font-size="11" fill="#253a4a">Wat Bo Road, near the Old Market</text>
  <text x="32" y="530" font-family="Arial, sans-serif" font-size="11" fill="#253a4a">★ 4.9 (128 Google reviews)</text>
  <rect x="32" y="542" width="90" height="16" rx="8" fill="#e0a840"/>
  <text x="77" y="554" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#0d1419">Get directions</text>
