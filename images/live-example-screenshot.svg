  <text x="420" y="33" font-family="Arial, sans-serif" font-size="12.5" fill="#4a3f36">Home</text>
  <text x="472" y="33" font-family="Arial, sans-serif" font-size="12.5" fill="#4a3f36">Menu</text>
  <text x="524" y="33" font-family="Arial, sans-serif" font-size="12.5" fill="#4a3f36">Location</text>
  <rect x="576" y="18" width="40" height="20" rx="10" fill="#c33a1f"/>
  <text x="596" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#fffdf8">Book</text>

  <!-- hero -->
  <rect x="0" y="56" width="640" height="220" fill="url(#live-grad)"/>
  <text x="320" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#fffdf8">Kroeung House</text>
