    <rect x="40" y="304" width="160" height="90" rx="12" fill="#f4e9d3"/>
    <rect x="240" y="304" width="160" height="90" rx="12" fill="#efd9b8"/>
    <rect x="440" y="304" width="160" height="90" rx="12" fill="#e9c9a0"/>
